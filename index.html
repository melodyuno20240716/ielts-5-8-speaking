<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雅思口语题库 2026年5-8月</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --coral: #ff665c;
    --coral-dark: #ef4c43;
    --coral-light: #fff0ee;
    --coral-mid: #ffddd9;
    --navy: #18213e;
    --navy-mid: #2e3d5c;
    --gold: #f5a623;
    --bg: #f7f5f0;
    --card: #ffffff;
    --text: #2a2a2a;
    --muted: #7a7a8a;
    --border: #e8e5df;
    --line: #f0eee8;
    --shadow: 0 2px 16px rgba(26,35,64,0.07);
    --shadow-lg: 0 10px 36px rgba(26,35,64,0.14);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans SC', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: var(--navy);
    color: #fff;
    position: sticky;
    top: 0;
    z-index: 20;
    box-shadow: 0 2px 20px rgba(0,0,0,0.18);
  }
  .header-inner {
    max-width: 1120px;
    margin: 0 auto;
    padding: 24px 18px 0;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
  }
  h1 {
    font-family: 'DM Serif Display', 'Noto Sans SC', serif;
    font-weight: 400;
    font-size: clamp(1.24rem, 2.3vw, 1.75rem);
    letter-spacing: 0;
  }
  h1 span { color: var(--coral); }
  .stats {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .stat {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 999px;
    padding: 4px 11px;
    font-size: 0.74rem;
    font-weight: 700;
    white-space: nowrap;
  }
  .stat.hot {
    background: var(--coral);
    border-color: var(--coral);
  }
  .tabs {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: none;
    padding: 11px 22px;
    color: rgba(255,255,255,0.62);
    border-bottom: 3px solid transparent;
    cursor: pointer;
    font-size: 0.94rem;
    font-weight: 600;
    transition: all 0.18s ease;
    white-space: nowrap;
  }
  .tab:hover { color: rgba(255,255,255,0.9); }
  .tab.active {
    color: #fff;
    border-bottom-color: var(--coral);
  }
  main {
    max-width: 1120px;
    margin: 0 auto;
    padding: 22px 16px 64px;
  }
  .filter-panel {
    background: rgba(255,255,255,0.72);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 22px;
    box-shadow: var(--shadow);
  }
  .filter-grid {
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 12px 18px;
    align-items: center;
  }
  .filter-label {
    color: var(--navy);
    font-size: 0.84rem;
    font-weight: 800;
  }
  .segmented {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .chip {
    border: 0;
    background: transparent;
    color: var(--text);
    padding: 7px 14px;
    border-radius: 999px;
    font: inherit;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.16s ease;
  }
  .chip:hover { background: var(--coral-light); }
  .chip.active {
    background: var(--coral);
    color: #fff;
    box-shadow: 0 8px 18px rgba(255,102,92,0.18);
  }
  .search-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    margin-top: 16px;
  }
  .search-wrap {
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #b5b5bd;
    font-size: 1.05rem;
  }
  .search-wrap input {
    width: 100%;
    height: 44px;
    padding: 0 14px 0 42px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: #fff;
    outline: none;
    font: inherit;
    color: var(--text);
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
  }
  .search-wrap input:focus {
    border-color: var(--coral);
    box-shadow: 0 0 0 4px rgba(255,102,92,0.12);
  }
  .clear-btn {
    height: 44px;
    border: 0;
    border-radius: 12px;
    background: var(--navy);
    color: #fff;
    padding: 0 15px;
    font: inherit;
    font-weight: 800;
    cursor: pointer;
  }
  .summary {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin: 4px 0 14px;
  }
  .section-label {
    color: var(--muted);
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .result-count {
    color: var(--navy-mid);
    font-size: 0.82rem;
    font-weight: 700;
  }
  .group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 24px 0 12px;
  }
  .group-header:first-child { margin-top: 0; }
  .group-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex: none;
  }
  .group-label {
    color: var(--navy);
    font-size: 0.82rem;
    font-weight: 800;
    letter-spacing: 0.04em;
  }
  .group-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }
  .card {
    position: relative;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 16px 13px;
    cursor: pointer;
    min-height: 154px;
    overflow: hidden;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
    border-color: var(--cat-color);
  }
  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }
  .card-title {
    flex: 1;
    color: var(--navy);
    font-size: 0.98rem;
    font-weight: 800;
    line-height: 1.42;
  }
  .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--cat-color);
    margin-right: 7px;
    vertical-align: middle;
  }
  .badge {
    flex: none;
    color: #fff;
    background: var(--coral);
    border-radius: 5px;
    padding: 2px 7px;
    font-size: 0.62rem;
    font-weight: 800;
    letter-spacing: 0.05em;
    margin-top: 2px;
  }
  .badge.old { background: var(--navy-mid); }
  .badge.required { background: var(--gold); }
  .card-en {
    color: var(--muted);
    font-size: 0.78rem;
    line-height: 1.45;
    min-height: 2.2em;
    margin-bottom: 10px;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .tag {
    color: var(--navy-mid);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 7px;
    font-size: 0.69rem;
    line-height: 1.45;
  }
  .card-arrow {
    margin-top: 12px;
    color: var(--coral-dark);
    font-size: 0.78rem;
    font-weight: 800;
    opacity: 0;
    text-align: right;
    transition: opacity 0.18s ease;
  }
  .card:hover .card-arrow { opacity: 1; }
  .empty {
    background: #fff;
    border: 1.5px dashed var(--border);
    border-radius: 14px;
    padding: 52px 18px;
    color: var(--muted);
    text-align: center;
    font-weight: 700;
  }
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(20,25,40,0.55);
    display: none;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .overlay.show {
    display: flex;
    animation: fadeIn 0.18s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    width: 100%;
    max-width: 720px;
    max-height: 88vh;
    overflow-y: auto;
    background: #fff;
    border-radius: 22px 22px 0 0;
    padding: 28px 24px 38px;
    position: relative;
    animation: slideUp 0.26s cubic-bezier(0.34,1.2,0.64,1);
  }
  @media (min-width: 760px) {
    .overlay { align-items: center; padding: 24px; }
    .modal { border-radius: 20px; max-height: 84vh; }
  }
  @keyframes slideUp {
    from { transform: translateY(48px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-close {
    position: absolute;
    top: 17px;
    right: 17px;
    width: 34px;
    height: 34px;
    border: 0;
    border-radius: 50%;
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
  }
  .modal-close:hover { background: var(--coral-mid); }
  .modal-meta {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: var(--cat-text);
    background: var(--cat-bg);
    border-radius: 999px;
    padding: 4px 11px;
    font-size: 0.74rem;
    font-weight: 800;
    margin-bottom: 11px;
  }
  .modal-title {
    color: var(--navy);
    font-size: 1.34rem;
    font-weight: 800;
    line-height: 1.38;
    padding-right: 34px;
    margin-bottom: 4px;
  }
  .modal-en {
    color: var(--muted);
    font-size: 0.9rem;
    font-style: italic;
    line-height: 1.55;
    margin-bottom: 20px;
  }
  .modal-section-title {
    color: var(--muted);
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 18px 0 10px;
  }
  .cue-card {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
  }
  .cue-card ul, .question-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .cue-card li {
    color: var(--navy-mid);
    font-size: 0.88rem;
    line-height: 1.5;
    display: flex;
    gap: 8px;
  }
  .cue-card li::before {
    content: '◆';
    color: var(--coral);
    font-size: 0.56rem;
    margin-top: 6px;
    flex: none;
  }
  .question-item {
    display: grid;
    grid-template-columns: 24px 1fr;
    gap: 10px;
    align-items: start;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 0.88rem;
    line-height: 1.5;
  }
  .num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--coral);
    color: #fff;
    font-size: 0.68rem;
    font-weight: 800;
    margin-top: 1px;
  }
  @media (max-width: 640px) {
    .header-inner { padding-left: 14px; padding-right: 14px; }
    .header-top { align-items: flex-start; flex-direction: column; gap: 10px; }
    .stats { justify-content: flex-start; }
    .tab { padding: 10px 17px; }
    main { padding-left: 12px; padding-right: 12px; }
    .filter-grid { grid-template-columns: 48px 1fr; gap: 10px 12px; }
    .chip { padding: 6px 11px; }
    .search-row { grid-template-columns: 1fr; }
    .clear-btn { width: 100%; }
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="header-top">
      <h1>雅思口语 <span>2026年 5-8月</span></h1>
      <div class="stats">
        <span class="stat hot">93 题</span>
        <span class="stat">Part1 37</span>
        <span class="stat">Part2&3 56</span>
      </div>
    </div>
    <nav class="tabs" id="partTabs">
      <button class="tab active" data-part="Part2">Part2 + Part3</button>
      <button class="tab" data-part="Part1">Part1</button>
      <button class="tab" data-part="全部">全部</button>
    </nav>
  </div>
</header>
<main>
  <section class="filter-panel">
    <div class="filter-grid">
      <div class="filter-label">新旧</div>
      <div class="segmented" id="statusFilters">
        <button class="chip active" data-status="全部">全部</button>
        <button class="chip" data-status="new">本季新题</button>
        <button class="chip" data-status="old">保留话题</button>
        <button class="chip" data-status="required">必考话题</button>
      </div>
      <div class="filter-label">主题</div>
      <div class="segmented" id="catFilters">
        <button class="chip active" data-cat="全部">全部</button>
        <button class="chip" data-cat="人物">人物</button>
        <button class="chip" data-cat="地点">地点</button>
        <button class="chip" data-cat="经历">经历</button>
        <button class="chip" data-cat="事物">事物</button>
        <button class="chip" data-cat="其他">其他</button>
      </div>
    </div>
    <div class="search-row">
      <label class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="searchInput" type="search" placeholder="搜索中文题目、英文题干或问题">
      </label>
      <button class="clear-btn" id="clearBtn">清空</button>
    </div>
  </section>
  <div class="summary">
    <div class="section-label" id="viewLabel">Part2 + Part3 / 全部</div>
    <div class="result-count" id="resultCount"></div>
  </div>
  <div id="content"></div>
</main>
<div class="overlay" id="overlay">
  <article class="modal" id="modal">
    <button class="modal-close" id="modalClose" aria-label="关闭">×</button>
    <div id="modalBody"></div>
  </article>
</div>

 "Before you travel to a city, what factors would you consider?", "What are the disadvantages of living in a very famous city?", "Do you prefer to visit well-developed cities or cities with a long history?", "For those who live in cities, is it because they want to or have to?"], "titleKey": "去过且喜欢的城市", "category": "地点"}, {"id": "part2-old-25", "part": "Part2", "status": "old", "date": "", "title": "购物场所", "en": "Describe a place where you enjoy shopping", "questions": [], "cue": ["Where it is", "How often you visit it", "What you usually buy at the mall", "And explain why it is a good place for shopping"], "p3": ["Why do people buy things they don’t need?", "Do you think it’s a waste of time to go shopping?", "Why are some people keen on shopping?", "What kind of people like shopping?", "Where do people like to shop in your country?", "Do you think women like shopping more than men?", "Does spending money make people feel happy?", "What are the differences between shopping in street markets and big shopping malls?", "What are the differences in the shopping habits of different age groups?", "What are the differences between shopping online and in-store?", "Do you think people's spending habits can lead to peer pressure?"], "titleKey": "购物场所", "category": "地点"}, {"id": "part2-old-26", "part": "Part2", "status": "old", "date": "", "title": "安静的地方", "en": "Describe a quiet place you like to go", "questions": [], "cue": ["Where it is", "How you knew it", "How often you go there", "What you do there", "And explain how you feel about the place"], "p3": ["Is it easy to find quiet places in your country? Why?", "Why do old people prefer to live in quiet places?", "Why are there more noises made at home now than in the past?", "Why do some people like to use noise as background sound when they are working or studying?", "How do people spend their leisure time in your country?", "How does technology affect the way people spend their leisure time?", "Do you think only old people have time for leisure?"], "titleKey": "安静的地方", "category": "地点"}, {"id": "part2-old-27", "part": "Part2", "status": "old", "date": "", "title": "喜欢的电视/网络节目", "en": "Describe a TV/online program you enjoy watching", "questions": [], "cue": ["What it is", "What it is about", "Which country it is from", "When you watch it", "And explain why you like to watch it"], "p3": ["What programs do people like to watch in your country?", "Do people in your country like to watch foreign TV programs?", "What's the benefit of letting kids watch animal videos than visiting zoos?", "Do teachers play videos in class in your country?", "Do you think watching talk shows is a waste of time?", "Do you think we can acquire knowledge from watching TV programs?", "What are the differences between the TV programs young people like to watch and those old people like to watch?", "What makes a popular TV or online program?"], "titleKey": "喜欢的电视/网络节目", "category": "事物"}];
const COLORS = {
  '人物': {dot:'#4B7CF3', bg:'#EEF3FF', text:'#2E5AC8'},
  '地点': {dot:'#2CC595', bg:'#E6FAF5', text:'#1A8C68'},
  '经历': {dot:'#F5A623', bg:'#FEF6E6', text:'#B87A10'},
  '事物': {dot:'#FF6B5B', bg:'#FFF0EE', text:'#CC3A2A'},
  '其他': {dot:'#7A7A8A', bg:'#F3F3F5', text:'#60606A'}
};
const STATUS_LABEL = {new:'本季新题', old:'保留话题', required:'必考话题'};
const state = {part:'Part2', status:'全部', cat:'全部', q:''};

function esc(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function colorFor(cat) {
  return COLORS[cat] || COLORS['其他'];
}

function badgeClass(status) {
  if (status === 'old') return 'badge old';
  if (status === 'required') return 'badge required';
  return 'badge';
}

function matches(item) {
  const partOk = state.part === '全部' || item.part === state.part;
  const statusOk = state.status === '全部' || item.status === state.status;
  const catOk = state.cat === '全部' || item.category === state.cat;
  const q = state.q.trim().toLowerCase();
  const haystack = [
    item.title, item.titleKey, item.en,
    ...(item.questions || []), ...(item.cue || []), ...(item.p3 || [])
  ].join(' ').toLowerCase();
  const queryOk = !q || haystack.includes(q);
  return partOk && statusOk && catOk && queryOk;
}

function cardHTML(item) {
  const c = colorFor(item.category);
  const title = item.titleKey || item.title;
  const subtitle = item.part === 'Part2' ? item.en : `${item.questions.length} 个 Part1 问题`;
  const tags = item.part === 'Part2'
    ? [...item.cue.slice(0, 2), `${item.p3.length} 个 Part3 问题`]
    : item.questions.slice(0, 3);
  return `<article class="card" style="--cat-color:${c.dot}" onclick="openModal('${item.id}')">
    <div class="card-top">
      <h2 class="card-title"><span class="dot"></span>${esc(title)}</h2>
      <span class="${badgeClass(item.status)}">${esc(STATUS_LABEL[item.status])}</span>
    </div>
    <div class="card-en">${esc(subtitle)}</div>
    <div class="card-tags">${tags.map(tag => `<span class="tag">${esc(tag)}</span>`).join('')}</div>
    <div class="card-arrow">查看详情 →</div>
  </article>`;
}

function render() {
  const content = document.getElementById('content');
  const filtered = TOPICS.filter(matches);
  document.getElementById('resultCount').textContent = `${filtered.length} / ${TOPICS.length} 题`;
  const partText = state.part === '全部' ? '全部模块' : (state.part === 'Part2' ? 'Part2 + Part3' : 'Part1');
  const statusText = state.status === '全部' ? '全部' : STATUS_LABEL[state.status];
  const catText = state.cat === '全部' ? '全部主题' : state.cat;
  document.getElementById('viewLabel').textContent = `${partText} / ${statusText} / ${catText}`;
  if (!filtered.length) {
    content.innerHTML = '<div class="empty">没有找到相关话题</div>';
    return;
  }
  if (state.cat === '全部' && !state.q) {
    const groups = ['人物','地点','经历','事物','其他'];
    content.innerHTML = groups.map(cat => {
      const items = filtered.filter(item => item.category === cat);
      if (!items.length) return '';
      const c = colorFor(cat);
      return `<section>
        <div class="group-header">
          <span class="group-dot" style="background:${c.dot}"></span>
          <span class="group-label">${cat} · ${items.length}</span>
          <span class="group-line"></span>
        </div>
        <div class="grid">${items.map(cardHTML).join('')}</div>
      </section>`;
    }).join('');
  } else {
    content.innerHTML = `<div class="grid">${filtered.map(cardHTML).join('')}</div>`;
  }
}

function modalList(items) {
  return `<div class="question-list">${items.map((item, idx) => `<div class="question-item"><span class="num">${idx + 1}</span><span>${esc(item)}</span></div>`).join('')}</div>`;
}

function openModal(id) {
  const item = TOPICS.find(topic => topic.id === id);
  if (!item) return;
  const c = colorFor(item.category);
  const body = document.getElementById('modalBody');
  const title = item.titleKey || item.title;
  let inner = `<div class="modal-meta" style="--cat-bg:${c.bg};--cat-text:${c.text}">
      <span class="dot" style="background:${c.dot}"></span>${item.part} · ${esc(item.category)} · ${esc(STATUS_LABEL[item.status])}${item.date ? ' · ' + esc(item.date) : ''}
    </div>
    <h2 class="modal-title">${esc(title)}</h2>`;
  if (item.part === 'Part2') {
    inner += `<div class="modal-en">${esc(item.en)}</div>
      <div class="modal-section-title">Cue Card — You should say</div>
      <div class="cue-card"><ul>${item.cue.map(point => `<li>${esc(point)}</li>`).join('')}</ul></div>
      <div class="modal-section-title">Part 3 — Discussion Questions</div>
      ${modalList(item.p3)}`;
  } else {
    inner += `<div class="modal-en">Part1 questions</div>
      <div class="modal-section-title">Questions</div>
      ${modalList(item.questions)}`;
  }
  body.innerHTML = inner;
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal(event) {
  if (event && event.target !== document.getElementById('overlay') && event.target.id !== 'modalClose') return;
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('partTabs').addEventListener('click', event => {
  const tab = event.target.closest('.tab');
  if (!tab) return;
  state.part = tab.dataset.part;
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el === tab));
  render();
});

document.getElementById('statusFilters').addEventListener('click', event => {
  const chip = event.target.closest('.chip');
  if (!chip) return;
  state.status = chip.dataset.status;
  document.querySelectorAll('#statusFilters .chip').forEach(el => el.classList.toggle('active', el === chip));
  render();
});

document.getElementById('catFilters').addEventListener('click', event => {
  const chip = event.target.closest('.chip');
  if (!chip) return;
  state.cat = chip.dataset.cat;
  document.querySelectorAll('#catFilters .chip').forEach(el => el.classList.toggle('active', el === chip));
  render();
});

document.getElementById('searchInput').addEventListener('input', event => {
  state.q = event.target.value;
  render();
});
document.getElementById('clearBtn').addEventListener('click', () => {
  state.q = '';
  document.getElementById('searchInput').value = '';
  render();
});
document.getElementById('overlay').addEventListener('click', closeModal);
document.getElementById('modalClose').addEventListener('click', closeModal);
document.addEventListener('keydown', event => {
  if (event.key === 'Escape') closeModal();
});

render();
</script>
</body>
</html>
